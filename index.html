<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Composer Piano Trainer</title>

    <!-- Dark theme baseline styles -->
    <link rel="stylesheet" href="style.css" />
    <!-- Piano keyboard styles -->
    <link rel="stylesheet" href="keyboard.css" />
    <!-- Trainer components styles -->
    <link rel="stylesheet" href="trainer.css" />
    <!-- Sidebar component styles -->
    <link rel="stylesheet" href="sidebar.css" />
    <!-- Gem rating styles -->
    <link rel="stylesheet" href="gem-rating.css" />

    <!-- React & ReactDOM (development CDN) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for in-browser JSX transform (keeps setup zero-build) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Music theory helper functions -->
    <script src="music-theory.js"></script>
    
    <!-- Preset system -->
    <script src="presets.js"></script>
    
    <!-- Score Gems rating system -->
    <script src="scoreGems.js"></script>
    
    <!-- Game logger utility -->
    <script src="logger.js"></script>
    
    <!-- Custom hooks -->
    <script type="text/babel" src="hooks/useTimer.js"></script>
    <script type="text/babel" src="hooks/useGameState.js"></script>
  </head>
  <body>
    <!-- SVG Icons -->
    <svg style="display:none">
      <symbol id="icon-gem" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2L3 9l9 13 9-13-9-7z"/>
      </symbol>
    </svg>
    
    <div id="root"></div>

    <!-- Sidebar component -->
    <script type="text/babel" src="sidebar.js"></script>
    
    <!-- Chord trainer component -->
    <script type="text/babel" src="chord-trainer.js"></script>
    
    <!-- Main application script. Using type="text/babel" lets us author in JSX without a build step. -->
    <script type="text/babel" src="app.js"></script>
  </body>
</html>
